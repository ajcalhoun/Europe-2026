  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#1c1917;--ink-muted:#78716c;--paper:#faf8f5;--paper-2:#f2ede7;--rule:#e7e0d8;--stamp-red:#b91c1c;--stamp-bg:#fef2f2;--gold:#b45309;--gold-bg:#fef9ee;--check:#15803d}
    body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
    .hero{background:var(--ink);color:var(--paper);padding:48px 24px 40px;text-align:center;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 28px,rgba(255,255,255,.018) 28px,rgba(255,255,255,.018) 29px)}
    .hero-flag{font-size:28px;letter-spacing:6px;margin-bottom:16px;position:relative}
    .hero-title{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,48px);font-weight:700;letter-spacing:-.5px;line-height:1.1;position:relative}
    .hero-sub{margin-top:10px;font-size:13px;font-weight:300;letter-spacing:2px;text-transform:uppercase;color:rgba(250,248,245,.55);position:relative}
    .hero-rule{width:48px;height:2px;background:#a78560;margin:18px auto;position:relative}
    .progress-wrap{max-width:360px;margin:0 auto;position:relative}
    .progress-label{display:flex;justify-content:space-between;font-size:12px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:rgba(250,248,245,.5);margin-bottom:8px}
    .progress-track{height:3px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#a78560,#d4a96a);border-radius:99px;transition:width .4s ease}
    .container{max-width:800px;margin:0 auto;padding:32px 20px 80px}
    .section-label{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--ink-muted);margin-bottom:14px;display:flex;align-items:center;gap:10px}
    .section-label::after{content:'';flex:1;height:1px;background:var(--rule)}

    /* WEATHER GRID */
    .weather-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-bottom:8px}
    .weather-card{border:1px solid var(--rule);border-radius:8px;padding:13px 15px;background:white;border-left-width:3px}
    .wc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
    .wc-zone{font-weight:600;font-size:13px}
    .wc-dates{font-size:11px;color:var(--ink-muted);margin-bottom:6px;letter-spacing:.3px}
    .wc-desc{font-size:11px;color:var(--ink-muted);line-height:1.5;margin-bottom:8px}

    /* forecast strip */
    .wc-forecast{border-top:1px dashed var(--rule);padding-top:8px;margin-top:2px}
    .wc-days{display:flex;gap:3px;overflow-x:auto;padding-bottom:2px}
    .wc-day{flex:1;min-width:34px;text-align:center;background:var(--paper);border-radius:5px;padding:5px 2px}
    .wc-day-label{font-size:9px;font-weight:600;letter-spacing:.3px;color:var(--ink-muted);margin-bottom:2px}
    .wc-day-icon{font-size:14px;margin:2px 0}
    .wc-day-hi{font-size:11px;font-weight:600;color:var(--ink)}
    .wc-day-lo{font-size:10px;color:var(--ink-muted)}

    /* pending state */
    .wc-pending{padding:8px 0 2px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
    .wc-avgs{font-size:12px;font-weight:600;color:var(--ink-muted)}
    .wc-avgs small{font-weight:300;font-size:10px;margin-left:3px}
    .wc-eta{font-size:10px;background:var(--paper-2);border-radius:99px;padding:2px 8px;color:var(--ink-muted);white-space:nowrap}
    .wc-loading{font-size:11px;color:#c4b9af;font-style:italic;padding:8px 0}

    .weather-footer{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;margin-top:6px}
    .weather-updated{font-size:11px;color:#c4b9af;font-style:italic}
    .refresh-btn{font-size:11px;font-family:'DM Sans',sans-serif;background:none;border:1px solid var(--rule);border-radius:99px;padding:3px 10px;color:var(--ink-muted);cursor:pointer;transition:all .15s}
    .refresh-btn:hover{border-color:var(--ink-muted);color:var(--ink)}
    .refresh-btn:disabled{opacity:.5;cursor:default}

    /* FILTERS + PACKING (unchanged) */
    .filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:28px}
    .filter-btn{padding:5px 14px;border-radius:99px;border:1px solid var(--rule);background:white;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--ink-muted);cursor:pointer;transition:all .15s;letter-spacing:.3px}
    .filter-btn:hover{border-color:var(--ink-muted);color:var(--ink)}
    .filter-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
    .pack-section{margin-bottom:8px;border:1px solid var(--rule);border-radius:8px;overflow:hidden;background:white}
    .pack-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none;background:white;transition:background .1s}
    .pack-header:hover{background:var(--paper-2)}
    .pack-header-left{font-weight:600;font-size:14px}
    .pack-header-right{display:flex;align-items:center;gap:10px}
    .pack-count{font-size:11px;color:var(--ink-muted);font-weight:400}
    .pack-chevron{font-size:10px;color:var(--ink-muted);transition:transform .2s}
    .pack-chevron.open{transform:rotate(180deg)}
    .pack-items{padding:4px 12px 10px;border-top:1px solid var(--rule)}
    .pack-item{display:flex;align-items:flex-start;gap:10px;padding:7px 6px;border-radius:5px;cursor:pointer;transition:background .1s}
    .pack-item:hover{background:var(--paper)}
    .pack-item.done{text-decoration:line-through;color:var(--ink-muted)}
    .checkbox{width:16px;height:16px;border-radius:3px;border:1.5px solid #d6cfc8;background:white;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .checkbox.checked{background:var(--check);border-color:var(--check)}
    .checkbox.checked::after{content:'✓';color:white;font-size:10px;font-weight:700}
    .item-text{font-size:13.5px;line-height:1.4;flex:1}
    .item-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
    .tag{font-size:10px;font-weight:600;letter-spacing:.5px;padding:1px 7px;border-radius:99px;text-transform:uppercase}
    .tag-required{background:var(--stamp-bg);color:var(--stamp-red);border:1px solid #fecaca}
    .tag-itinerary{background:var(--gold-bg);color:var(--gold);border:1px solid #fde68a}
    .tag-wedding{background:#fdf2f8;color:#9d174d;border:1px solid #fbcfe8}
    .tag-church{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .tag-beach{background:#ecfeff;color:#0e7490;border:1px solid #a5f3fc}
    .refresh-note{margin-top:32px;padding:16px 20px;background:white;border:1px solid var(--rule);border-radius:8px;font-size:12.5px;color:var(--ink-muted);line-height:1.6}
    .refresh-note strong{color:var(--ink)}
    .footer{text-align:center;margin-top:24px;font-size:11px;color:#c4b9af;letter-spacing:1px}
    code{font-size:12px;background:var(--paper-2);padding:1px 5px;border-radius:3px}
    @media(max-width:500px){.weather-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useCallback } = React;
  const STORAGE_KEY = 'europe2026_packing_v1';
  const WEATHER_KEY = 'europe2026_weather_v2';
  const WEATHER_TTL = 6 * 60 * 60 * 1000; // 6 hours — forecasts don't change fast

  // Open-Meteo forecast endpoint — free, no API key
  const OM_BASE = 'https://api.open-meteo.com/v1/forecast';

  const ZONES = [
    { zone:"🇬🇧 London",             start:"2026-05-31", end:"2026-06-04", lat:51.5074,  lon:-0.1278,  color:"#3b5a8f", avgHi:"68°F", avgLo:"50°F", desc:"Cool evenings, ~27% rain chance/day. Layers + rain jacket essential." },
    { zone:"🇮🇹 Cinque Terre",        start:"2026-06-04", end:"2026-06-06", lat:44.1024,  lon:9.8241,   color:"#2d7a50", avgHi:"78°F", avgLo:"64°F", desc:"Warm Mediterranean. Beach + strenuous hiking." },
    { zone:"🇮🇹 Tuscany / Florence",  start:"2026-06-06", end:"2026-06-10", lat:43.7696,  lon:11.2558,  color:"#b45309", avgHi:"79°F", avgLo:"60°F", desc:"Warm & sunny. Church visits, art galleries, outdoor dining." },
    { zone:"🇮🇹 Rome",                start:"2026-06-10", end:"2026-06-12", lat:41.9028,  lon:12.4964,  color:"#b91c1c", avgHi:"80°F", avgLo:"66°F", desc:"Hot & sunny. Wedding Jun 15. Vatican: covered shoulders + knees." },
    { zone:"🇵🇹 Carcavelos / Lisbon", start:"2026-06-12", end:"2026-06-18", lat:38.7169,  lon:-9.1395,  color:"#0f766e", avgHi:"77°F", avgLo:"61°F", desc:"Dry & sunny, ~5% rain chance. Beach at Carcavelos." },
    { zone:"🇵🇹 Porto",               start:"2026-06-18", end:"2026-06-22", lat:41.1579,  lon:-8.6291,  color:"#1d4ed8", avgHi:"73°F", avgLo:"57°F", desc:"Cooler & breezier, ~16% rain chance. Light layer useful at night." },
  ];

  // WMO weather code → emoji
  const wmoEmoji = code => {
    const c = parseInt(code ?? 0);
    if (c === 0) return '☀️';
    if (c === 1) return '🌤';
    if (c === 2) return '⛅';
    if (c === 3) return '☁️';
    if ([45,48].includes(c)) return '🌫';
    if ([51,53,55,56,57].includes(c)) return '🌦';
    if ([61,63,65,66,67,80,81,82].includes(c)) return '🌧';
    if ([71,73,75,77,85,86].includes(c)) return '❄️';
    if ([95,96,99].includes(c)) return '⛈';
    return '🌡';
  };

  // Short weekday + day label e.g. "M 31"
  const dayLabel = dateStr => {
    const d = new Date(dateStr + 'T12:00:00Z');
    return ['Su','M','T','W','Th','F','Sa'][d.getUTCDay()] + '\u00a0' + d.getUTCDate();
  };

  // Days until a date is within the 16-day forecast window
  const daysUntilInRange = startStr => {
    const today = new Date(); today.setHours(0,0,0,0);
    const start = new Date(startStr + 'T00:00:00');
    const diff  = Math.ceil((start - today) / 86400000);
    return Math.max(0, diff - 16);
  };

  async function fetchZone(zone) {
    const url = `${OM_BASE}?latitude=${zone.lat}&longitude=${zone.lon}`
      + `&daily=temperature_2m_max,temperature_2m_min,weathercode`
      + `&temperature_unit=fahrenheit`
      + `&start_date=${zone.start}&end_date=${zone.end}`
      + `&timezone=auto&forecast_days=16`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('forecast error');
    return res.json();
  }

  function timeAgo(ts) {
    if (!ts) return null;
    const mins = Math.round((Date.now() - ts) / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    return `${Math.round(mins/60)}h ago`;
  }

  /* ── WEATHER CARD ── */
  function WeatherCard({ zone, data, loading }) {
    const eta    = daysUntilInRange(zone.start);
    const days   = data?.daily?.time || [];
    const hasData = days.length > 0;

    return (
      <div className="weather-card" style={{ borderLeftColor: zone.color }}>
        <div className="wc-header">
          <div>
            <div className="wc-zone" style={{ color: zone.color }}>{zone.zone}</div>
            <div className="wc-dates">{zone.start.slice(5).replace('-','/').replace(/^0/,'')} – {zone.end.slice(5).replace('-','/').replace(/^0/,'')}</div>
          </div>
        </div>
        <div className="wc-desc">{zone.desc}</div>

        <div className="wc-forecast">
          {loading && !hasData && <div className="wc-loading">fetching forecast…</div>}

          {!loading && !hasData && (
            <div className="wc-pending">
              <span className="wc-avgs">↑ {zone.avgHi} <small>avg</small> &nbsp; ↓ {zone.avgLo} <small>avg</small></span>
              {eta > 0 && <span className="wc-eta">Forecast in ~{eta} day{eta!==1?'s':''}</span>}
            </div>
          )}

          {hasData && (
            <div className="wc-days">
              {days.map((d, i) => (
                <div className="wc-day" key={d}>
                  <div className="wc-day-label">{dayLabel(d)}</div>
                  <div className="wc-day-icon">{wmoEmoji(data.daily.weathercode[i])}</div>
                  <div className="wc-day-hi">{Math.round(data.daily.temperature_2m_max[i])}°</div>
                  <div className="wc-day-lo">{Math.round(data.daily.temperature_2m_min[i])}°</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ── PACKING DATA ── */
  const SECTIONS = [
    { cat:"👔 Formal / Occasion", items:[
      {name:"Wedding outfit — suit or blazer + dress trousers",     tags:["wedding"],required:true},
      {name:"Dress shirt (white or light blue)",                     tags:["wedding","church"],required:true},
      {name:"Tie or pocket square",                                  tags:["wedding"]},
      {name:"Dress shoes (leather or smart leather-look)",           tags:["wedding","church"],required:true},
      {name:"Smart belt matching dress shoes",                       tags:["wedding"]},
      {name:"Blazer (doubles for church, theater, afternoon tea)",   tags:["church"],required:true},
    ]},
    { cat:"👕 Everyday Clothing", items:[
      {name:"T-shirts / lightweight polos (×5)"},
      {name:"Long-sleeve shirts or light button-downs (×2) — London layers + church modesty"},
      {name:"Chinos / smart casual trousers (×2)"},
      {name:"Shorts (×4) — Italy & Portugal dominate the second half"},
      {name:"Lightweight jeans (×1) — London evenings + Porto nights"},
      {name:"Swimwear (×1–2) — Monterosso beach + Carcavelos",tags:["beach"],required:true},
      {name:"Underwear (×7)"},
      {name:"Socks — ankle (×4) + mid-crew for hiking (×3)"},
      {name:"Pajamas / sleepwear"},
    ]},
    { cat:"🧥 Outerwear", items:[
      {name:"Light rain jacket (packable) — London ~12 rainy days in June",required:true},
      {name:"Light fleece or zip sweater — London evenings + Porto nights",required:true},
      {name:"Sun hat or ball cap — Italy sun is strong"},
    ]},
    { cat:"👟 Footwear", items:[
      {name:"Trail sneakers / sturdy walking shoes — Cinque Terre hike + cobblestones",required:true},
      {name:"Sandals / flip-flops — beach days",tags:["beach"],required:true},
      {name:"Dress shoes (covered above under Formal)"},
      {name:"Compression socks for flights (×2 pairs)"},
    ]},
    { cat:"🎒 Bags & Carry", items:[
      {name:"Baggu (foldable tote) — Hyde Park picnic Jun 1 + shopping",required:true,itinerary:true},
      {name:"Compact picnic blanket — Hyde Park picnic Jun 1",          required:true,itinerary:true},
      {name:"Daypack / small backpack — Cinque Terre hikes, full day trips",required:true},
      {name:"EDC sling — everyday carry for city days, museums, transit",   required:true},
      {name:"Reusable water bottle"},
    ]},
    { cat:"📚 Reading & Writing", items:[
      {name:"Kindle + charging cable"},
      {name:"Physical book(s) — flights, trains, slow mornings"},
      {name:"Travel notebook / journal"},
      {name:"Pens (×2–3, including a good one)"},
    ]},
    { cat:"💻 Electronics & Tech", items:[
      {name:"Phone + charger + cable"},
      {name:"UK plug adapter (Type G) — London",             required:true},
      {name:"EU plug adapter (Type C/F) — Italy + Portugal", required:true},
      {name:"Portable battery / power bank"},
      {name:"Noise-canceling headphones / earbuds — overnight flights"},
      {name:"Camera + memory cards"},
    ]},
    { cat:"🧴 Toiletries", items:[
      {name:"Sunscreen SPF 50+ — Italy sun is intense",required:true},
      {name:"Lip balm with SPF"},
      {name:"Deodorant"},
      {name:"Toothbrush + toothpaste"},
      {name:"Shampoo / conditioner (travel size or solid bar)"},
      {name:"Body wash / soap"},
      {name:"Razor + blades"},
      {name:"Moisturizer"},
      {name:"Hand sanitizer (×2 small)"},
      {name:"Blister prevention / Band-Aids — Cinque Terre hiking",required:true},
      {name:"Ibuprofen / Tylenol"},
      {name:"Allergy meds if needed"},
      {name:"Prescription medications (full supply + extra)"},
      {name:"Melatonin — jet lag on overnight flights"},
    ]},
    { cat:"📋 Documents & Money", items:[
      {name:"Passport (valid 6+ months beyond Jun 2026)",required:true},
      {name:"Printed / digital flight confirmations"},
      {name:"Airbnb / hotel confirmation printouts",     required:true},
      {name:"Travel insurance documents"},
      {name:"Credit card with no foreign transaction fees",required:true},
      {name:"GBP cash — London tubes & markets",          required:true},
      {name:"EUR cash — Italy small vendors + Cinque Terre"},
      {name:"ETIAS authorization (EU entry requirement — verify status)",required:true},
      {name:"Emergency contacts card (physical)"},
    ]},
    { cat:"⛪ Church Visit Essentials", items:[
      {name:"Shoulders covered — Westminster Abbey, Vatican, Italian churches",required:true,tags:["church"]},
      {name:"Knees covered — trousers or long shorts for Vatican",             required:true,tags:["church"]},
      {name:"Quiet shoes for stone floors"},
      {name:"Small cross-body bag — hands free for prayer books, maps"},
    ]},
    { cat:"🗺 Miscellaneous", items:[
      {name:"Small travel umbrella — London backup"},
      {name:"Packing cubes (highly recommended for 24-day trip)"},
      {name:"Laundry bags — dry/dirty separation"},
      {name:"Neck pillow — overnight CLT–LHR flight"},
      {name:"Eye mask + ear plugs — overnight flights"},
      {name:"Wedding card / gift logistics if bringing a physical gift"},
    ]},
  ];

  const ALL_KEYS = SECTIONS.flatMap(s => s.items.map(i => `${s.cat}::${i.name}`));

  /* ── APP ── */
  function App() {
    const [checked,   setChecked]   = useState(() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}; } catch { return {}; }});
    const [filter,    setFilter]    = useState('all');
    const [expanded,  setExpanded]  = useState({});
    const [wxCache,   setWxCache]   = useState(() => { try { return JSON.parse(localStorage.getItem(WEATHER_KEY))||{}; } catch { return {}; }});
    const [wxLoading, setWxLoading] = useState(false);

    useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(checked)); }, [checked]);

    const loadWeather = useCallback(async (force=false) => {
      const ts = wxCache._ts;
      if (!force && ts && (Date.now() - ts) < WEATHER_TTL) return;
      setWxLoading(true);
      try {
        const results = await Promise.allSettled(ZONES.map(z => fetchZone(z)));
        const fresh = { _ts: Date.now() };
        results.forEach((r,i) => {
          // only store if we got actual daily data back
          if (r.status === 'fulfilled' && r.value?.daily?.time?.length > 0) {
            fresh[ZONES[i].zone] = r.value;
          }
        });
        setWxCache(fresh);
        localStorage.setItem(WEATHER_KEY, JSON.stringify(fresh));
      } catch(e) {}
      setWxLoading(false);
    }, [wxCache._ts]);

    useEffect(() => { loadWeather(); }, []);

    const toggle    = key => setChecked(p => ({...p, [key]: !p[key]}));
    const toggleSec = cat => setExpanded(p => ({...p, [cat]: p[cat]===false ? true : false}));

    const total = ALL_KEYS.length;
    const done  = ALL_KEYS.filter(k => checked[k]).length;
    const pct   = Math.round((done/total)*100);

    const visible = SECTIONS.map(s => ({
      ...s,
      items: s.items.filter(i => {
        if (filter==='all')       return true;
        if (filter==='required')  return i.required;
        if (filter==='itinerary') return i.itinerary;
        if (filter==='wedding')   return i.tags?.includes('wedding');
        if (filter==='church')    return i.tags?.includes('church');
        return true;
      })
    })).filter(s => s.items.length > 0);

    return (
      <div>
        <div className="hero">
          <div className="hero-flag">🇬🇧 🇮🇹 🇵🇹</div>
          <div className="hero-title">Europe 2026<br/><em style={{fontWeight:500,fontSize:'0.72em',opacity:.8}}>Packing List</em></div>
          <div className="hero-rule"/>
          <div className="hero-sub">May 31 – Jun 22 &nbsp;·&nbsp; UK → Italy → Portugal &nbsp;·&nbsp; Returns Madrid Jun 23</div>
          <div className="hero-rule"/>
          <div className="progress-wrap">
            <div className="progress-label"><span>Packed</span><span>{done} / {total} ({pct}%)</span></div>
            <div className="progress-track"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
          </div>
        </div>

        <div className="container">
          <div className="section-label">Forecast by Destination</div>
          <div className="weather-grid">
            {ZONES.map(z => (
              <WeatherCard key={z.zone} zone={z} data={wxCache[z.zone]} loading={wxLoading} />
            ))}
          </div>
          <div className="weather-footer">
            <span className="weather-updated">
              {wxCache._ts
                ? `Forecasts updated ${timeAgo(wxCache._ts)} · refreshes every 6h`
                : 'Fetching forecasts…'}
            </span>
            <button className="refresh-btn" onClick={()=>loadWeather(true)} disabled={wxLoading}>
              {wxLoading ? '↻ updating…' : '↻ refresh now'}
            </button>
          </div>

          <div className="section-label">Filter</div>
          <div className="filters">
            {[
              {id:'all',       label:'All Items'},
              {id:'required',  label:'🔴 Must-Haves'},
              {id:'itinerary', label:'📋 From Itinerary'},
              {id:'wedding',   label:'💍 Wedding (Jun 15)'},
              {id:'church',    label:'⛪ Church Visits'},
            ].map(f=>(
              <button key={f.id} className={`filter-btn${filter===f.id?' active':''}`} onClick={()=>setFilter(f.id)}>{f.label}</button>
            ))}
          </div>

          <div className="section-label">Items</div>
          {visible.map(sec => {
            const isOpen  = expanded[sec.cat] !== false;
            const secDone = sec.items.filter(i => checked[`${sec.cat}::${i.name}`]).length;
            return (
              <div className="pack-section" key={sec.cat}>
                <div className="pack-header" onClick={()=>toggleSec(sec.cat)}>
                  <div className="pack-header-left">{sec.cat}</div>
                  <div className="pack-header-right">
                    <span className="pack-count">{secDone}/{sec.items.length}</span>
                    <span className={`pack-chevron${isOpen?' open':''}`}>▼</span>
                  </div>
                </div>
                {isOpen && (
                  <div className="pack-items">
                    {sec.items.map(item => {
                      const key    = `${sec.cat}::${item.name}`;
                      const isDone = checked[key];
                      return (
                        <div key={item.name} className={`pack-item${isDone?' done':''}`} onClick={()=>toggle(key)}>
                          <div className={`checkbox${isDone?' checked':''}`}/>
                          <div>
                            <div className="item-text">{item.name}</div>
                            {!isDone && (
                              <div className="item-tags">
                                {item.required  && <span className="tag tag-required">must-have</span>}
                                {item.itinerary && <span className="tag tag-itinerary">📋 itinerary</span>}
                                {(item.tags||[]).map(t=>(
                                  <span key={t} className={`tag tag-${t}`}>
                                    {t==='wedding'?'💍 wedding':t==='church'?'⛪ church':t==='beach'?'🏖 beach':t}
                                  </span>
                                ))}
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}

          <div className="refresh-note">
            <strong>↻ How to update this list:</strong> Share itinerary changes or new notes with Claude and re-download <code>index.html</code>. Checked items are saved in the browser and survive file updates.
          </div>
          <div className="footer">AJ · Europe 2026 · Built with Claude</div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
