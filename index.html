  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --orange:#F4511E;--orange-2:#EA580C;--orange-text:#9A3412;--navy:#1E3A5F;--sand:#F6C177;
      --bg:#F5F5F5;--card:#FFFFFF;--rule:#D1D5DB;--text:#111827;--muted:#4B5563;
      --shadow:0px 4px 12px rgba(0,0,0,0.08);--radius:12px;--hdr:148px
    }
    html,body,#root{height:100%}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.5}

    /* HEADER */
    .app-header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--navy);padding:18px 24px 0;text-align:center}
    .header-title{font-size:clamp(18px,4.5vw,28px);font-weight:700;color:#fff;letter-spacing:-.3px;line-height:1.1}
    .header-dates{margin-top:3px;font-size:11px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5)}
    .header-route{margin-top:2px;font-size:13px;color:rgba(255,255,255,.65);letter-spacing:.3px}
    .tab-bar{display:flex;margin-top:12px}
    .tab-btn{flex:1;padding:10px 0;border:none;background:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;border-bottom:2px solid transparent;transition:all .18s}
    .tab-btn.active{color:#fff;border-bottom-color:var(--sand)}
    .tab-btn:hover:not(.active){color:rgba(255,255,255,.7)}

    .tab-content{padding-top:calc(var(--hdr) + 2px);max-width:820px;margin:0 auto;padding-left:16px;padding-right:16px;padding-bottom:60px}
    .sl{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin:24px 0 12px;display:flex;align-items:center;gap:10px}
    .sl::after{content:'';flex:1;height:1px;background:var(--rule)}
    .sl:first-child{margin-top:20px}

    /* WEATHER */
    .weather-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
    .weather-card{border:1px solid var(--rule);border-radius:var(--radius);padding:13px 15px;background:var(--card);border-left-width:3px;box-shadow:var(--shadow)}
    .wc-zone{font-weight:600;font-size:13px}
    .wc-dates{font-size:11px;color:var(--muted);margin:2px 0 5px}
    .wc-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:8px}
    .wc-forecast{border-top:1px dashed var(--rule);padding-top:8px}
    .wc-days{display:flex;gap:3px;overflow-x:auto;padding-bottom:2px}
    .wc-day{flex:1;min-width:36px;text-align:center;background:var(--bg);border-radius:8px;padding:5px 2px}
    .wc-day-label{font-size:10px;font-weight:600;color:var(--muted);margin-bottom:1px}
    .wc-day-icon{font-size:13px;margin:2px 0}
    .wc-day-hi{font-size:11px;font-weight:600}
    .wc-day-lo{font-size:10px;color:var(--muted)}
    .wc-day-rain{font-size:10px;color:#1d4ed8;margin-top:1px;font-weight:500}
    .wc-pending{padding:6px 0 2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .wc-avgs{font-size:12px;font-weight:600;color:var(--muted)}
    .wc-avgs small{font-weight:300;font-size:10px;margin-left:2px}
    .wc-eta{font-size:10px;background:var(--bg);border-radius:99px;padding:2px 8px;color:var(--muted);white-space:nowrap}
    .wc-loading{font-size:11px;color:var(--muted);font-style:italic;padding:6px 0}
    .wx-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
    .wx-updated{font-size:11px;color:var(--muted);font-style:italic}
    .refresh-btn{font-size:11px;font-family:'Inter',sans-serif;background:none;border:1px solid var(--rule);border-radius:99px;padding:3px 10px;color:var(--muted);cursor:pointer;transition:all .15s}
    .refresh-btn:hover{border-color:var(--navy);color:var(--navy)}
    .refresh-btn:disabled{opacity:.5;cursor:default}

    /* DAY CARDS */
    .day-card{background:var(--card);border:1px solid var(--rule);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
    .day-header{display:flex;align-items:stretch;cursor:pointer;user-select:none}
    .day-num{width:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:white;min-height:64px}
    .day-header-body{flex:1;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px}
    .day-header-left{flex:1;min-width:0}
    .day-date-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
    .day-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
    .day-location{font-size:11px;color:var(--muted);margin-top:2px}
    .day-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .day-wx{text-align:right}
    .day-wx-icon{font-size:15px;line-height:1}
    .day-wx-temps{font-size:11px;font-weight:600;white-space:nowrap;margin-top:1px}
    .day-wx-rain{font-size:10px;color:#3b82f6;white-space:nowrap;margin-top:1px}
    .day-wx-pending{font-size:11px;color:var(--muted);white-space:nowrap}
    .day-chevron{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0}
    .day-chevron.open{transform:rotate(180deg)}
    .day-body{border-top:1px solid var(--rule);padding:12px 14px 14px}
    .day-tip{background:#FFF3F0;border-left:3px solid var(--orange);border-radius:8px;padding:8px 12px;font-size:13px;color:#7C2D12;line-height:1.6;margin-bottom:12px}
    .day-tip strong{font-weight:700;color:#7C2D12}

    /* SPLIT TIMELINE */
    .split-timeline{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
    .split-col{}
    .split-col-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--rule)}

    /* TIMELINE */
    .timeline{display:flex;flex-direction:column}
    .tl-item{display:flex;gap:9px;align-items:flex-start;position:relative}
    .tl-item:not(:last-child) .tl-dot-wrap::after{content:'';position:absolute;left:5px;top:13px;width:1px;bottom:-6px;background:var(--rule)}
    .tl-dot-wrap{position:relative;flex-shrink:0;width:11px}
    .tl-dot{width:11px;height:11px;border-radius:50%;background:var(--rule);position:relative;z-index:1;margin-top:3px}
    .tl-dot.highlight{background:var(--orange)}
    .tl-dot.flight{background:var(--navy)}
    .tl-dot.food{background:#16a34a}
    .tl-dot.church{background:#2563eb}
    .tl-dot.key{background:var(--orange-2)}
    .tl-text{padding-bottom:9px;flex:1;min-width:0}
    .tl-time{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;margin-bottom:1px}
    .tl-desc{font-size:13px;color:var(--text);line-height:1.5}
    .tl-note{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5}

    /* PACKING */
    .progress-bar-wrap{background:var(--card);border:1px solid var(--rule);border-radius:var(--radius);padding:14px 16px;margin-bottom:4px;box-shadow:var(--shadow)}
    .progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .progress-title{font-size:13px;font-weight:600}
    .progress-frac{font-size:12px;color:var(--muted)}
    .progress-track{height:5px;background:var(--rule);border-radius:99px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--orange-2));border-radius:99px;transition:width .4s ease}
    .filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
    .filter-btn{padding:5px 13px;border-radius:99px;border:1px solid var(--rule);background:var(--card);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
    .filter-btn:hover{border-color:var(--navy);color:var(--navy)}
    .filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
    .pack-section{margin-bottom:6px;border:1px solid var(--rule);border-radius:var(--radius);overflow:hidden;background:var(--card);box-shadow:var(--shadow)}
    .pack-header{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;cursor:pointer;user-select:none;transition:background .1s}
    .pack-header:hover{background:var(--bg)}
    .pack-header-left{font-weight:600;font-size:14px}
    .pack-header-right{display:flex;align-items:center;gap:8px}
    .pack-count{font-size:11px;color:var(--muted)}
    .pack-chevron{font-size:10px;color:var(--muted);transition:transform .2s}
    .pack-chevron.open{transform:rotate(180deg)}
    .pack-items{padding:4px 12px 10px;border-top:1px solid var(--rule)}
    .pack-item{display:flex;align-items:flex-start;gap:10px;padding:7px 5px;border-radius:8px;cursor:pointer;transition:background .1s}
    .pack-item:hover{background:var(--bg)}
    .pack-item.done{text-decoration:line-through;color:var(--muted)}
    .checkbox{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--rule);background:white;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .checkbox.checked{background:var(--orange);border-color:var(--orange)}
    .checkbox.checked::after{content:'✓';color:white;font-size:10px;font-weight:700}
    .item-text{font-size:13.5px;line-height:1.4;flex:1}
    .item-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
    .tag{font-size:10px;font-weight:600;letter-spacing:.5px;padding:1px 7px;border-radius:99px;text-transform:uppercase}
    .tag-required{background:#FFF3F0;color:#9A3412;border:1px solid rgba(244,81,30,.25)}
    .tag-itinerary{background:#FFF7ED;color:#C2410C;border:1px solid rgba(246,193,119,.5)}
    .tag-wedding{background:#fdf2f8;color:#9d174d;border:1px solid #fbcfe8}
    .tag-church{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .tag-beach{background:#ecfeff;color:#0e7490;border:1px solid #a5f3fc}
    .app-footer{text-align:center;margin-top:28px;font-size:11px;color:var(--muted);letter-spacing:1px}
    code{font-size:12px;background:var(--bg);padding:1px 5px;border-radius:4px}
    @media(max-width:560px){.split-timeline{grid-template-columns:1fr}.weather-grid{grid-template-columns:1fr}:root{--hdr:156px}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useCallback, useRef } = React;
  const TODAY = new Date().toISOString().slice(0,10);
  const STORAGE_KEY='europe2026_packing_v1';
  const WEATHER_KEY='europe2026_weather_v3';
  const WEATHER_TTL=6*60*60*1000;
  const OM_BASE='https://api.open-meteo.com/v1/forecast';

  const ZONES=[
    {zone:"🇬🇧 London",            start:"2026-05-31",end:"2026-06-04",lat:51.5074,lon:-0.1278, color:"#3b5a8f",avgHi:68,avgLo:50,avgRain:27,desc:"Cool evenings, ~27% rain chance/day. Layers + rain jacket essential."},
    {zone:"🇮🇹 Cinque Terre",       start:"2026-06-04",end:"2026-06-06",lat:44.1024,lon:9.8241,  color:"#2d7a50",avgHi:78,avgLo:64,avgRain:16,desc:"Warm Mediterranean. Beach + strenuous hiking."},
    {zone:"🇮🇹 Tuscany / Florence", start:"2026-06-06",end:"2026-06-10",lat:43.7696,lon:11.2558, color:"#b45309",avgHi:79,avgLo:60,avgRain:15,desc:"Warm & sunny. Church visits, galleries, outdoor dining."},
    {zone:"🇮🇹 Rome",               start:"2026-06-10",end:"2026-06-12",lat:41.9028,lon:12.4964, color:"#b91c1c",avgHi:80,avgLo:66,avgRain:10,desc:"Hot & sunny. Vatican: covered shoulders + knees."},
    {zone:"🇵🇹 Carcavelos / Lisbon",start:"2026-06-12",end:"2026-06-18",lat:38.7169,lon:-9.1395, color:"#0f766e",avgHi:77,avgLo:61,avgRain:8, desc:"Dry & sunny, ~5% rain chance. Beach at Carcavelos."},
    {zone:"🇵🇹 Porto",              start:"2026-06-18",end:"2026-06-22",lat:41.1579,lon:-8.6291, color:"#1d4ed8",avgHi:73,avgLo:57,avgRain:20,desc:"Cooler & breezier, ~16% rain chance. Light layer useful at night."},
  ];

  const wmoEmoji=c=>{c=parseInt(c??0);if(c===0)return'☀️';if(c===1)return'🌤';if(c===2)return'⛅';if(c===3)return'☁️';if([45,48].includes(c))return'🌫';if([51,53,55,56,57].includes(c))return'🌦';if([61,63,65,66,67,80,81,82].includes(c))return'🌧';if([71,73,75,77,85,86].includes(c))return'❄️';if([95,96,99].includes(c))return'⛈';return'🌡';};
  const dayLabel=s=>{const d=new Date(s+'T12:00:00Z');return['Su','M','T','W','Th','F','Sa'][d.getUTCDay()]+'\u00a0'+d.getUTCDate();};
  const daysUntil=s=>{const t=new Date();t.setHours(0,0,0,0);return Math.max(0,Math.ceil((new Date(s+'T00:00:00')-t)/86400000)-16);};
  const timeAgo=ts=>{if(!ts)return null;const m=Math.round((Date.now()-ts)/60000);if(m<1)return'just now';if(m<60)return`${m}m ago`;return`${Math.round(m/60)}h ago`;};

  /* ── GOOGLE SHEETS CONFIG ──────────────────────────────────────────────────
   * 1. In your Google Sheet, go to File → Share → Publish to web
   *    OR set sharing to "Anyone with the link" → Viewer
   * 2. Paste your Sheet ID below (the long string in the URL between /d/ and /edit)
   * 3. SHEET_GID is the tab ID — 0 for the first tab, find others in the URL (#gid=...)
   *
   * Sheet column structure (row 1 = headers, ignored):
   *   A: Date       e.g. 2026-05-30
   *   B: Time       e.g. 2:21 PM  (leave blank for no time)
   *   C: Activity   e.g. Depart MAF → DFW on AA 3652
   *   D: Notes      e.g. Conf: LAEYVK · Seats 15D & 15F  (optional)
   *   E: Type       flight | food | highlight | church | key  (optional)
   *   F: Group      left | right | all  (use left/right for split-timeline days like
   *                 May 30, May 31, Jun 12; leave blank or "all" for whole-group events)
   * ─────────────────────────────────────────────────────────────────────── */
  const SHEET_ID  = '1dd7_KlgfxNpBFCcCaN0D5gczsdVCZ1VGt_5zngW200o';
  const SHEET_KEY = 'europe2026_sheet_v1';
  const SHEET_TTL = 15*60*1000; // refresh every 15 minutes

  const sheetCSVUrl = ()=>
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=flow`;

  // Full CSV parser — handles quoted fields and embedded commas
  function parseCSVRows(text){
    const rows=[];let row=[],f='',q=false;
    for(let i=0;i<text.length;i++){
      const c=text[i];
      if(q){if(c==='"'&&text[i+1]==='"'){f+='"';i++;}else if(c==='"')q=false;else f+=c;}
      else{if(c==='"')q=true;else if(c===','){row.push(f);f='';}else if(c==='\n'){row.push(f);rows.push(row);row=[];f='';}else if(c!=='\r')f+=c;}
    }
    if(f||row.length){row.push(f);rows.push(row);}
    return rows;
  }

  // Parses the "flow" tab — day header rows have day# in col B; event rows have time in col A
  function parseSheetCSV(csv){
    const rows=parseCSVRows(csv);
    const events={};
    let currentDate=null;
    const MNUM={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
    const CAT_TYPE={Flights:'flight',Food:'food',Sightseeing:'highlight',Entertainment:'highlight',Lodging:'key'};
    const CHURCH_RX=/westminster|abbey|vatican|basilica|cathedral|chapel|evensong|prayer/i;
    for(const row of rows){
      const a=(row[0]||'').trim();
      const b=(row[1]||'').trim();
      const c=(row[2]||'').trim();
      const d=(row[3]||'').trim();
      const cat=(row[14]||'').trim();
      if(!a||!c||a.includes('Date'))continue;
      const dayNum=parseInt(b);
      if(b&&!isNaN(dayNum)&&dayNum>0){
        // Day header row — parse date from e.g. "Sat, May 30"
        const m=a.match(/([A-Z][a-z]{2})\s+(\d+)/);
        if(m&&MNUM[m[1]]){
          currentDate=`2026-${String(MNUM[m[1]]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
          if(!events[currentDate])events[currentDate]=[];
        }
      } else if(currentDate){
        // Event row — skip nightly lodging accounting entries
        if(a==='11:59 PM'&&cat==='Lodging')continue;
        const type=CHURCH_RX.test(c)?'church':(CAT_TYPE[cat]||'');
        events[currentDate].push({time:a,text:c,note:d||'',type,group:'all'});
      }
    }
    return events;
  }

  async function fetchSheet(){
    if(!SHEET_ID)return null;
    const res=await fetch(sheetCSVUrl());
    if(!res.ok)throw new Error('sheet fetch failed');
    return parseSheetCSV(await res.text());
  }

  async function fetchZone(z){
    const r=await fetch(`${OM_BASE}?latitude=${z.lat}&longitude=${z.lon}&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max&temperature_unit=fahrenheit&start_date=${z.start}&end_date=${z.end}&timezone=auto&forecast_days=16`);
    if(!r.ok)throw new Error();return r.json();
  }

  function wxForDate(date,wxCache){
    const zone=ZONES.find(z=>date>=z.start&&date<z.end);
    if(!zone)return null;
    const data=wxCache[zone.zone];
    if(data?.daily?.time){
      const idx=data.daily.time.indexOf(date);
      if(idx!==-1)return{
        hi:Math.round(data.daily.temperature_2m_max[idx]),
        lo:Math.round(data.daily.temperature_2m_min[idx]),
        code:data.daily.weathercode[idx],
        rain:data.daily.precipitation_probability_max?.[idx]??null,
        color:zone.color,
        isAvg:false,
      };
    }
    // fall back to historical zone averages
    return{hi:zone.avgHi,lo:zone.avgLo,rain:zone.avgRain,code:null,color:zone.color,isAvg:true};
  }

  /* ── WEATHER ZONE CARD ── */
  function WeatherCard({zone,data,loading}){
    const eta=daysUntil(zone.start);
    const days=data?.daily?.time||[];
    const has=days.length>0;
    return(
      <div className="weather-card" style={{borderLeftColor:zone.color}}>
        <div className="wc-zone" style={{color:zone.color}}>{zone.zone}</div>
        <div className="wc-dates">{zone.start.slice(5).replace('-','/')} – {zone.end.slice(5).replace('-','/')}</div>
        <div className="wc-desc">{zone.desc}</div>
        <div className="wc-forecast">
          {loading&&!has&&<div className="wc-loading">fetching…</div>}
          {!loading&&!has&&<div className="wc-pending">
            <span className="wc-avgs">↑{zone.avgHi}°F<small> avg</small>&nbsp; ↓{zone.avgLo}°F<small> avg</small></span>
            {eta>0&&<span className="wc-eta">Forecast in ~{eta}d</span>}
          </div>}
          {has&&<div className="wc-days">{days.map((d,i)=>{
            const rain=data.daily.precipitation_probability_max?.[i];
            return(
              <div className="wc-day" key={d}>
                <div className="wc-day-label">{dayLabel(d)}</div>
                <div className="wc-day-icon">{wmoEmoji(data.daily.weathercode[i])}</div>
                <div className="wc-day-hi">{Math.round(data.daily.temperature_2m_max[i])}°</div>
                <div className="wc-day-lo">{Math.round(data.daily.temperature_2m_min[i])}°</div>
                {rain!=null&&<div className="wc-day-rain">💧{rain}%</div>}
              </div>
            );
          })}</div>}
        </div>
      </div>
    );
  }

  /* ── TIMELINE ── */
  function Timeline({events}){
    return(
      <div className="timeline">
        {events.map((e,i)=>(
          <div className="tl-item" key={i}>
            <div className="tl-dot-wrap"><div className={`tl-dot${e.type?' '+e.type:''}`}/></div>
            <div className="tl-text">
              {e.time&&<div className="tl-time">{e.time}</div>}
              <div className="tl-desc">{e.text}</div>
              {e.note&&<div className="tl-note">{e.note}</div>}
            </div>
          </div>
        ))}
      </div>
    );
  }

          <div className="day-num" style={{background:day.color}}>{day.day}</div>
          <div className="day-header-body">
            <div className="day-header-left">
              <div className="day-date-label">{day.label}</div>
              <div className="day-title">{day.title}</div>
              <div className="day-location">{day.loc}</div>
            </div>
            <div className="day-header-right">
              {wx
                ?<div className="day-wx">
                  {!wx.isAvg&&<div className="day-wx-icon">{wmoEmoji(wx.code)}</div>}
                  <div className="day-wx-temps" style={{color:wx.isAvg?'var(--ink-muted)':wx.color}}>↑{wx.hi}° ↓{wx.lo}°</div>
                  {wx.rain!=null&&<div className="day-wx-rain">💧{wx.rain}%{wx.isAvg?' avg':''}</div>}
                  {wx.isAvg&&<div style={{fontSize:9,color:'#c4b9af',marginTop:1,textAlign:'right'}}>historical avg</div>}
                </div>
                :<div className="day-wx"><div className="day-wx-pending">no forecast</div></div>
              }
              <span className={`day-chevron${open?' open':''}`}>▼</span>
            </div>
          </div>
        </div>
        {open&&(
          <div className="day-body">
            <div className="day-tip"><strong>💡 </strong>{day.tip}</div>
            {day.splitEvents&&(
              <div className="split-timeline">
                <div className="split-col">
                  <div className="split-col-label">{day.splitEvents.left.label}</div>
                  <Timeline events={day.splitEvents.left.events}/>
                </div>
                <div className="split-col">
                  <div className="split-col-label">{day.splitEvents.right.label}</div>
                  <Timeline events={day.splitEvents.right.events}/>
                </div>
              </div>
            )}
            {day.events&&day.events.length>0&&(
              <>
                {day.splitEvents&&<div style={{borderTop:'1px solid var(--rule)',margin:'10px 0 12px',paddingTop:2}}><div className="split-col-label" style={{marginBottom:8}}>🤝 Full Group</div></div>}
                <Timeline events={day.events}/>
              </>
            )}
          </div>
        )}
      </div>
    );
  }

  /* ── PACKING DATA ── */
  const SECTIONS=[
    {cat:"👔 Formal / Occasion",items:[
      {name:"Wedding outfit — suit or blazer + dress trousers",tags:["wedding"],required:true},
      {name:"Dress shirt (white or light blue)",tags:["wedding","church"],required:true},
      {name:"Tie or pocket square",tags:["wedding"]},
      {name:"Dress shoes (leather or smart leather-look)",tags:["wedding","church"],required:true},
      {name:"Smart belt matching dress shoes",tags:["wedding"]},
      {name:"Blazer (doubles for church, theater, afternoon tea)",tags:["church"],required:true},
    ]},
    {cat:"👕 Everyday Clothing",items:[
      {name:"T-shirts / lightweight polos (×5)"},
      {name:"Long-sleeve shirts or light button-downs (×2) — London layers + church modesty"},
      {name:"Chinos / smart casual trousers (×2)"},
      {name:"Shorts (×4) — Italy & Portugal dominate the second half"},
      {name:"Lightweight jeans (×1) — London evenings + Porto nights"},
      {name:"Swimwear (×1–2) — Monterosso beach + Carcavelos",tags:["beach"],required:true},
      {name:"Underwear (×7)"},{name:"Socks — ankle (×4) + mid-crew for hiking (×3)"},{name:"Pajamas / sleepwear"},
    ]},
    {cat:"🧥 Outerwear",items:[
      {name:"Light rain jacket (packable) — London ~12 rainy days in June",required:true},
      {name:"Light fleece or zip sweater — London evenings + Porto nights",required:true},
      {name:"Sun hat or ball cap — Italy sun is strong"},
    ]},
    {cat:"👟 Footwear",items:[
      {name:"Trail sneakers / sturdy walking shoes — Cinque Terre hike + cobblestones",required:true},
      {name:"Sandals / flip-flops — beach days",tags:["beach"],required:true},
      {name:"Dress shoes (covered above under Formal)"},
      {name:"Compression socks for flights (×2 pairs)"},
    ]},
    {cat:"🎒 Bags & Carry",items:[
      {name:"Baggu (foldable tote) — Hyde Park picnic Jun 1 + shopping",required:true,itinerary:true},
      {name:"Compact picnic blanket — Hyde Park picnic Jun 1",required:true,itinerary:true},
      {name:"Daypack / small backpack — Cinque Terre hikes, full day trips",required:true},
      {name:"EDC sling — everyday carry for city days, museums, transit",required:true},
      {name:"Reusable water bottle"},
    ]},
    {cat:"📚 Reading & Writing",items:[
      {name:"Kindle + charging cable"},{name:"Physical book(s) — flights, trains, slow mornings"},
      {name:"Travel notebook / journal"},{name:"Pens (×2–3, including a good one)"},
    ]},
    {cat:"💻 Electronics & Tech",items:[
      {name:"Phone + charger + cable"},
      {name:"UK plug adapter (Type G) — London",required:true},
      {name:"EU plug adapter (Type C/F) — Italy + Portugal",required:true},
      {name:"Portable battery / power bank"},
      {name:"Noise-canceling headphones / earbuds — overnight flights"},
      {name:"Camera + memory cards"},
    ]},
    {cat:"🧴 Toiletries",items:[
      {name:"Sunscreen SPF 50+ — Italy sun is intense",required:true},
      {name:"Lip balm with SPF"},{name:"Deodorant"},{name:"Toothbrush + toothpaste"},
      {name:"Shampoo / conditioner (travel size or solid bar)"},{name:"Body wash / soap"},
      {name:"Razor + blades"},{name:"Moisturizer"},{name:"Hand sanitizer (×2 small)"},
      {name:"Blister prevention / Band-Aids — Cinque Terre hiking",required:true},
      {name:"Ibuprofen / Tylenol"},{name:"Allergy meds if needed"},
      {name:"Prescription medications (full supply + extra)"},
      {name:"Melatonin — jet lag on overnight flights"},
    ]},
    {cat:"📋 Documents & Money",items:[
      {name:"Passport (valid 6+ months beyond Jun 2026)",required:true},
      {name:"Printed / digital flight confirmations"},
      {name:"Airbnb / hotel confirmation printouts",required:true},
      {name:"Travel insurance documents"},
      {name:"Credit card with no foreign transaction fees",required:true},
      {name:"GBP cash — London tubes & markets",required:true},
      {name:"EUR cash — Italy small vendors + Cinque Terre"},
      {name:"ETIAS authorization (EU entry requirement — verify status)",required:true},
      {name:"Emergency contacts card (physical)"},
    ]},
    {cat:"⛪ Church Visit Essentials",items:[
      {name:"Shoulders covered — Westminster Abbey, Vatican, Italian churches",required:true,tags:["church"]},
      {name:"Knees covered — trousers or long shorts for Vatican",required:true,tags:["church"]},
      {name:"Quiet shoes for stone floors"},
      {name:"Small cross-body bag — hands free for prayer books, maps"},
    ]},
    {cat:"🗺 Miscellaneous",items:[
      {name:"Small travel umbrella — London backup"},
      {name:"Packing cubes (highly recommended for 24-day trip)"},
      {name:"Laundry bags — dry/dirty separation"},
      {name:"Neck pillow — overnight CLT–LHR flight"},
      {name:"Eye mask + ear plugs — overnight flights"},
      {name:"Wedding card / gift logistics if bringing a physical gift"},
    ]},
  ];
  const ALL_KEYS=SECTIONS.flatMap(s=>s.items.map(i=>`${s.cat}::${i.name}`));

  /* ── APP ── */
  function App(){
    const [tab,      setTab]      = useState('itinerary');
    const todayRef = useRef(null);
    const [checked,  setChecked]  = useState(()=>{try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch{return{};}});
    const [filter,   setFilter]   = useState('all');
    const [expanded, setExpanded] = useState({});
    const [wxCache,  setWxCache]  = useState(()=>{try{return JSON.parse(localStorage.getItem(WEATHER_KEY))||{};}catch{return{};}});
    const [wxLoading,setWxLoading]= useState(false);
    const [sheetData,setSheetData]= useState(()=>{try{const s=JSON.parse(localStorage.getItem(SHEET_KEY));return s?.data||null;}catch{return null;}});
    const [sheetTs,  setSheetTs]  = useState(()=>{try{return JSON.parse(localStorage.getItem(SHEET_KEY))?._ts||null;}catch{return null;}});
    const [sheetLoading,setSheetLoading]=useState(false);
    const [sheetErr,setSheetErr]  = useState(null);

    useEffect(()=>{localStorage.setItem(STORAGE_KEY,JSON.stringify(checked));},[checked]);

    const loadWeather=useCallback(async(force=false)=>{
      const ts=wxCache._ts;
      if(!force&&ts&&(Date.now()-ts)<WEATHER_TTL)return;
      setWxLoading(true);
      try{
        const results=await Promise.allSettled(ZONES.map(z=>fetchZone(z)));
        const fresh={_ts:Date.now()};
        results.forEach((r,i)=>{if(r.status==='fulfilled'&&r.value?.daily?.time?.length>0)fresh[ZONES[i].zone]=r.value;});
        setWxCache(fresh);
        localStorage.setItem(WEATHER_KEY,JSON.stringify(fresh));
      }catch(e){}
      setWxLoading(false);
    },[wxCache._ts]);

    useEffect(()=>{loadWeather();},[]);

    const loadSheet=useCallback(async(force=false)=>{
      if(!SHEET_ID)return;
      if(!force&&sheetTs&&(Date.now()-sheetTs)<SHEET_TTL)return;
      setSheetLoading(true);setSheetErr(null);
      try{
        const data=await fetchSheet();
        if(data){
          const payload={_ts:Date.now(),data};
          localStorage.setItem(SHEET_KEY,JSON.stringify(payload));
          setSheetData(data);setSheetTs(payload._ts);
        }
      }catch(e){setSheetErr('Could not load sheet — check it is set to public/viewer.');}
      setSheetLoading(false);
    },[sheetTs]);

    useEffect(()=>{loadSheet();},[]);

    useEffect(()=>{
      if(tab!=='itinerary'||!todayRef.current)return;
      const hdr=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--hdr'))||148;
      const top=todayRef.current.getBoundingClientRect().top+window.scrollY-hdr-8;
      window.scrollTo({top:Math.max(0,top),behavior:'smooth'});
    },[tab]);

    // merge sheet events into a day — returns {events, splitEvents} overrides
    const resolveDay=useCallback((day)=>{
      if(!sheetData||!sheetData[day.date])return{events:day.events,splitEvents:day.splitEvents};
      const rows=sheetData[day.date];
      const allRows =rows.filter(r=>r.group==='all'||r.group==='');
      const leftRows=rows.filter(r=>r.group==='left');
      const rightRows=rows.filter(r=>r.group==='right');
      const toEvent=r=>({time:r.time,text:r.text,note:r.note,type:r.type});
      // if sheet has split (left/right) rows, build splitEvents preserving labels from hardcoded
      if(leftRows.length||rightRows.length){
        const base=day.splitEvents||{left:{label:'Group A',events:[]},right:{label:'Group B',events:[]}};
        return{
          splitEvents:{left:{label:base.left.label,events:leftRows.map(toEvent)},right:{label:base.right.label,events:rightRows.map(toEvent)}},
          events:allRows.length?allRows.map(toEvent):day.events,
        };
      }
      // day has a hardcoded split layout and sheet has no left/right rows — preserve the split as-is
      if(day.splitEvents)return{events:day.events,splitEvents:day.splitEvents};
      return{events:allRows.length?allRows.map(toEvent):day.events,splitEvents:day.splitEvents};
    },[sheetData]);

    const toggle    = key=>setChecked(p=>({...p,[key]:!p[key]}));
    const toggleSec = cat=>setExpanded(p=>({...p,[cat]:p[cat]===false?true:false}));
    const total=ALL_KEYS.length; const done=ALL_KEYS.filter(k=>checked[k]).length; const pct=Math.round((done/total)*100);

    const visible=SECTIONS.map(s=>({...s,items:s.items.filter(i=>{
      if(filter==='all')return true; if(filter==='required')return i.required;
      if(filter==='itinerary')return i.itinerary; if(filter==='wedding')return i.tags?.includes('wedding');
      if(filter==='church')return i.tags?.includes('church'); return true;
    })})).filter(s=>s.items.length>0);

    return(
      <div>
        <div className="app-header">
          <div className="header-title">Europe 2026</div>
          <div className="header-dates">May 30 – June 22</div>
          <div className="header-route">🇬🇧 UK &nbsp;→&nbsp; 🇮🇹 Italy &nbsp;→&nbsp; 🇵🇹 Portugal</div>
          <div className="tab-bar">
            <button className={`tab-btn${tab==='itinerary'?' active':''}`} onClick={()=>setTab('itinerary')}>🗓 Itinerary</button>
            <button className={`tab-btn${tab==='weather'?' active':''}`} onClick={()=>setTab('weather')}>🌤 Weather</button>
            <button className={`tab-btn${tab==='packing'?' active':''}`} onClick={()=>setTab('packing')}>🧳 Packing{done>0&&<span style={{fontSize:10,opacity:.7,marginLeft:4}}>({pct}%)</span>}</button>
          </div>
        </div>

        {tab==='itinerary'&&(
          <div className="tab-content">
            <div className="sl">
              14 Days · tap ▼ to expand
              {SHEET_ID&&(
                <span style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                  {sheetErr&&<span style={{fontSize:10,color:'var(--stamp-red)'}}>{sheetErr}</span>}
                  {sheetTs&&!sheetErr&&<span style={{fontSize:10,color:'#c4b9af'}}>sheet {timeAgo(sheetTs)}</span>}
                  <button className="refresh-btn" onClick={()=>loadSheet(true)} disabled={sheetLoading} style={{fontSize:10}}>
                    {sheetLoading?'↻ syncing…':'↻ sync sheet'}
                  </button>
                </span>
              )}
            </div>
            {DAYS.map(d=>{const resolved=resolveDay(d);return(<div key={d.date} ref={d.date===TODAY?todayRef:null}><DayCard day={{...d,...resolved}} wxCache={wxCache}/></div>);})}
            <div className="app-footer">AJ · Europe 2026 · Built with Claude</div>
          </div>
        )}

        {tab==='weather'&&(
          <div className="tab-content">
            <div className="sl">Forecast by Destination</div>
            <div className="weather-grid">
              {ZONES.map(z=><WeatherCard key={z.zone} zone={z} data={wxCache[z.zone]} loading={wxLoading}/>)}
            </div>
            <div className="wx-footer">
              <span className="wx-updated">{wxCache._ts?`Updated ${timeAgo(wxCache._ts)} · refreshes every 6h`:'Fetching forecasts…'}</span>
              <button className="refresh-btn" onClick={()=>loadWeather(true)} disabled={wxLoading}>{wxLoading?'↻ updating…':'↻ refresh'}</button>
            </div>
            <div className="app-footer">Open-Meteo · free · no API key · 16-day window</div>
          </div>
        )}

        {tab==='packing'&&(
          <div className="tab-content">
            <div className="sl">Progress</div>
            <div className="progress-bar-wrap">
              <div className="progress-top"><span className="progress-title">Items packed</span><span className="progress-frac">{done} / {total} &nbsp;·&nbsp; {pct}%</span></div>
              <div className="progress-track"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
            </div>
            <div className="sl">Filter</div>
            <div className="filters">
              {[{id:'all',label:'All Items'},{id:'required',label:'🔴 Must-Haves'},{id:'itinerary',label:'📋 Itinerary'},{id:'wedding',label:'💍 Wedding'},{id:'church',label:'⛪ Church'}].map(f=>(
                <button key={f.id} className={`filter-btn${filter===f.id?' active':''}`} onClick={()=>setFilter(f.id)}>{f.label}</button>
              ))}
            </div>
            <div className="sl">Items</div>
            {visible.map(sec=>{
              const isOpen=expanded[sec.cat]!==false;
              const secDone=sec.items.filter(i=>checked[`${sec.cat}::${i.name}`]).length;
              return(
                <div className="pack-section" key={sec.cat}>
                  <div className="pack-header" onClick={()=>toggleSec(sec.cat)}>
                    <div className="pack-header-left">{sec.cat}</div>
                    <div className="pack-header-right"><span className="pack-count">{secDone}/{sec.items.length}</span><span className={`pack-chevron${isOpen?' open':''}`}>▼</span></div>
                  </div>
                  {isOpen&&(<div className="pack-items">{sec.items.map(item=>{
                    const key=`${sec.cat}::${item.name}`;const isDone=checked[key];
                    return(
                      <div key={item.name} className={`pack-item${isDone?' done':''}`} onClick={()=>toggle(key)}>
                        <div className={`checkbox${isDone?' checked':''}`}/>
                        <div>
                          <div className="item-text">{item.name}</div>
                          {!isDone&&(<div className="item-tags">
                            {item.required&&<span className="tag tag-required">must-have</span>}
                            {item.itinerary&&<span className="tag tag-itinerary">📋 itinerary</span>}
                            {(item.tags||[]).map(t=><span key={t} className={`tag tag-${t}`}>{t==='wedding'?'💍 wedding':t==='church'?'⛪ church':t==='beach'?'🏖 beach':t}</span>)}
                          </div>)}
                        </div>
                      </div>
                    );
                  })}</div>)}
                </div>
              );
            })}
            <div className="app-footer">AJ · Europe 2026 · Built with Claude</div>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
