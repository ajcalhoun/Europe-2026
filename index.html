  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#1c1917;--ink-muted:#78716c;--paper:#faf8f5;--paper-2:#f2ede7;--rule:#e7e0d8;--gold:#b45309;--gold-bg:#fef9ee;--stamp-red:#b91c1c;--stamp-bg:#fef2f2;--check:#15803d;--hdr:148px}
    html,body,#root{height:100%}
    body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);overflow-x:hidden}

    /* FIXED HEADER */
    .app-header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--ink);padding:18px 24px 0;text-align:center}
    .header-title{font-family:'Playfair Display',serif;font-size:clamp(20px,4.5vw,32px);font-weight:700;color:#faf8f5;letter-spacing:-.3px;line-height:1.1}
    .header-dates{margin-top:3px;font-size:11px;font-weight:300;letter-spacing:2.5px;text-transform:uppercase;color:rgba(250,248,245,.5)}
    .header-route{margin-top:2px;font-size:13px;color:rgba(250,248,245,.7);letter-spacing:.5px}
    .tab-bar{display:flex;margin-top:12px}
    .tab-btn{flex:1;padding:10px 0;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:rgba(250,248,245,.4);cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;letter-spacing:.2px}
    .tab-btn.active{color:#faf8f5;border-bottom-color:#a78560}
    .tab-btn:hover:not(.active){color:rgba(250,248,245,.65)}

    /* SCROLL BODY */
    .tab-content{padding-top:calc(var(--hdr) + 2px);max-width:820px;margin:0 auto;padding-left:16px;padding-right:16px;padding-bottom:60px}

    /* SECTION LABEL */
    .sl{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--ink-muted);margin:24px 0 12px;display:flex;align-items:center;gap:10px}
    .sl::after{content:'';flex:1;height:1px;background:var(--rule)}
    .sl:first-child{margin-top:20px}

    /* WEATHER TAB */
    .weather-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
    .weather-card{border:1px solid var(--rule);border-radius:8px;padding:13px 15px;background:white;border-left-width:3px}
    .wc-zone{font-weight:600;font-size:13px}
    .wc-dates{font-size:11px;color:var(--ink-muted);margin:2px 0 5px}
    .wc-desc{font-size:11px;color:var(--ink-muted);line-height:1.5;margin-bottom:8px}
    .wc-forecast{border-top:1px dashed var(--rule);padding-top:8px}
    .wc-days{display:flex;gap:3px;overflow-x:auto;padding-bottom:2px}
    .wc-day{flex:1;min-width:33px;text-align:center;background:var(--paper);border-radius:5px;padding:5px 2px}
    .wc-day-label{font-size:9px;font-weight:600;color:var(--ink-muted);margin-bottom:1px}
    .wc-day-icon{font-size:13px;margin:2px 0}
    .wc-day-hi{font-size:11px;font-weight:600}
    .wc-day-lo{font-size:10px;color:var(--ink-muted)}
    .wc-pending{padding:6px 0 2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .wc-avgs{font-size:12px;font-weight:600;color:var(--ink-muted)}
    .wc-avgs small{font-weight:300;font-size:10px;margin-left:2px}
    .wc-eta{font-size:10px;background:var(--paper-2);border-radius:99px;padding:2px 8px;color:var(--ink-muted);white-space:nowrap}
    .wc-loading{font-size:11px;color:#c4b9af;font-style:italic;padding:6px 0}
    .wx-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
    .wx-updated{font-size:11px;color:#c4b9af;font-style:italic}
    .refresh-btn{font-size:11px;font-family:'DM Sans',sans-serif;background:none;border:1px solid var(--rule);border-radius:99px;padding:3px 10px;color:var(--ink-muted);cursor:pointer;transition:all .15s}
    .refresh-btn:hover{border-color:var(--ink-muted);color:var(--ink)}
    .refresh-btn:disabled{opacity:.5;cursor:default}

    /* ITINERARY TAB */
    .day-card{background:white;border:1px solid var(--rule);border-radius:10px;margin-bottom:10px;overflow:hidden}
    .day-header{display:flex;align-items:stretch;cursor:pointer;user-select:none}
    .day-num{width:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:white;min-height:58px}
    .day-header-body{flex:1;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px}
    .day-header-left{flex:1}
    .day-date-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-muted);margin-bottom:2px}
    .day-title{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3}
    .day-location{font-size:11px;color:var(--ink-muted);margin-top:2px}
    .day-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .day-wx{text-align:right}
    .day-wx-temps{font-size:12px;font-weight:600;white-space:nowrap}
    .day-wx-icon{font-size:16px}
    .day-wx-pending{font-size:10px;color:#c4b9af;white-space:nowrap}
    .day-chevron{font-size:10px;color:var(--ink-muted);transition:transform .2s;flex-shrink:0}
    .day-chevron.open{transform:rotate(180deg)}

    .day-body{border-top:1px solid var(--rule);padding:12px 14px 14px}

    /* TIP */
    .day-tip{background:var(--gold-bg);border:1px solid #fde68a;border-radius:6px;padding:8px 12px;font-size:12px;color:var(--gold);line-height:1.5;margin-bottom:12px}
    .day-tip strong{color:#92400e}

    /* TIMELINE */
    .timeline{display:flex;flex-direction:column;gap:0}
    .tl-item{display:flex;gap:10px;align-items:flex-start;position:relative}
    .tl-item:not(:last-child) .tl-dot::after{content:'';position:absolute;left:5px;top:14px;width:1px;bottom:-8px;background:var(--rule)}
    .tl-dot{width:11px;height:11px;border-radius:50%;background:#d6cfc8;flex-shrink:0;margin-top:3px;position:relative;z-index:1}
    .tl-dot.highlight{background:#a78560}
    .tl-dot.flight{background:#3b5a8f}
    .tl-dot.food{background:#15803d}
    .tl-dot.church{background:#1d4ed8}
    .tl-dot.key{background:#b91c1c}
    .tl-text{padding-bottom:10px;flex:1}
    .tl-time{font-size:10px;font-weight:600;color:var(--ink-muted);letter-spacing:.5px;margin-bottom:1px}
    .tl-desc{font-size:13px;color:var(--ink);line-height:1.4}
    .tl-note{font-size:11px;color:var(--ink-muted);margin-top:2px;line-height:1.4}

    /* PACKING TAB */
    .progress-bar-wrap{background:white;border:1px solid var(--rule);border-radius:8px;padding:14px 16px;margin-bottom:4px}
    .progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .progress-title{font-size:13px;font-weight:600}
    .progress-frac{font-size:12px;color:var(--ink-muted)}
    .progress-track{height:4px;background:var(--paper-2);border-radius:99px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#a78560,#d4a96a);border-radius:99px;transition:width .4s ease}
    .filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
    .filter-btn{padding:5px 13px;border-radius:99px;border:1px solid var(--rule);background:white;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--ink-muted);cursor:pointer;transition:all .15s}
    .filter-btn:hover{border-color:var(--ink-muted);color:var(--ink)}
    .filter-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
    .pack-section{margin-bottom:6px;border:1px solid var(--rule);border-radius:8px;overflow:hidden;background:white}
    .pack-header{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;cursor:pointer;user-select:none;transition:background .1s}
    .pack-header:hover{background:var(--paper-2)}
    .pack-header-left{font-weight:600;font-size:14px}
    .pack-header-right{display:flex;align-items:center;gap:8px}
    .pack-count{font-size:11px;color:var(--ink-muted)}
    .pack-chevron{font-size:10px;color:var(--ink-muted);transition:transform .2s}
    .pack-chevron.open{transform:rotate(180deg)}
    .pack-items{padding:4px 12px 10px;border-top:1px solid var(--rule)}
    .pack-item{display:flex;align-items:flex-start;gap:10px;padding:7px 5px;border-radius:5px;cursor:pointer;transition:background .1s}
    .pack-item:hover{background:var(--paper)}
    .pack-item.done{text-decoration:line-through;color:var(--ink-muted)}
    .checkbox{width:16px;height:16px;border-radius:3px;border:1.5px solid #d6cfc8;background:white;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .checkbox.checked{background:var(--check);border-color:var(--check)}
    .checkbox.checked::after{content:'✓';color:white;font-size:10px;font-weight:700}
    .item-text{font-size:13.5px;line-height:1.4;flex:1}
    .item-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
    .tag{font-size:10px;font-weight:600;letter-spacing:.5px;padding:1px 7px;border-radius:99px;text-transform:uppercase}
    .tag-required{background:var(--stamp-bg);color:var(--stamp-red);border:1px solid #fecaca}
    .tag-itinerary{background:var(--gold-bg);color:var(--gold);border:1px solid #fde68a}
    .tag-wedding{background:#fdf2f8;color:#9d174d;border:1px solid #fbcfe8}
    .tag-church{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .tag-beach{background:#ecfeff;color:#0e7490;border:1px solid #a5f3fc}
    .app-footer{text-align:center;margin-top:28px;font-size:11px;color:#c4b9af;letter-spacing:1px}
    code{font-size:12px;background:var(--paper-2);padding:1px 5px;border-radius:3px}
    @media(max-width:500px){.weather-grid{grid-template-columns:1fr}:root{--hdr:156px}}
  </style>
</head>

  const { useState, useEffect, useCallback } = React;

  const ZONES=[

  ];

  const wmoEmoji=c=>{c=parseInt(c??0);if(c===0)return'☀️';if(c===1)return'🌤';if(c===2)return'⛅';if(c===3)return'☁️';if([45,48].includes(c))return'🌫';if([51,53,55,56,57].includes(c))return'🌦';if([61,63,65,66,67,80,81,82].includes(c))return'🌧';if([71,73,75,77,85,86].includes(c))return'❄️';if([95,96,99].includes(c))return'⛈';return'🌡';};
  const dayLabel=s=>{const d=new Date(s+'T12:00:00Z');return['Su','M','T','W','Th','F','Sa'][d.getUTCDay()]+'\u00a0'+d.getUTCDate();};
  const daysUntil=s=>{const t=new Date();t.setHours(0,0,0,0);return Math.max(0,Math.ceil((new Date(s+'T00:00:00')-t)/86400000)-16);};
  const timeAgo=ts=>{if(!ts)return null;const m=Math.round((Date.now()-ts)/60000);if(m<1)return'just now';if(m<60)return`${m}m ago`;return`${Math.round(m/60)}h ago`;};

  async function fetchZone(z){
    const r=await fetch(`${OM_BASE}?latitude=${z.lat}&longitude=${z.lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&temperature_unit=fahrenheit&start_date=${z.start}&end_date=${z.end}&timezone=auto&forecast_days=16`);
    if(!r.ok)throw new Error();return r.json();
  }

  // look up forecast for a specific date
  function wxForDate(date, wxCache){
    const zone=ZONES.find(z=>date>=z.start&&date<z.end);
    if(!zone)return null;
    const data=wxCache[zone.zone];
    if(!data?.daily?.time)return null;
    const idx=data.daily.time.indexOf(date);
    if(idx===-1)return null;
    return{hi:Math.round(data.daily.temperature_2m_max[idx]),lo:Math.round(data.daily.temperature_2m_min[idx]),code:data.daily.weathercode[idx],color:zone.color};
  }

  /* ── ITINERARY DATA ── */

  /* ── WEATHER CARD (zone overview) ── */
  function WeatherCard({zone,data,loading}){
    const eta=daysUntil(zone.start);
    const days=data?.daily?.time||[];
    const has=days.length>0;
    return(
      <div className="weather-card" style={{borderLeftColor:zone.color}}>
        <div className="wc-zone" style={{color:zone.color}}>{zone.zone}</div>
        <div className="wc-dates">{zone.start.slice(5).replace('-','/')} – {zone.end.slice(5).replace('-','/')}</div>
        <div className="wc-desc">{zone.desc}</div>
        <div className="wc-forecast">
          {loading&&!has&&<div className="wc-loading">fetching…</div>}
          {!loading&&!has&&<div className="wc-pending">
            <span className="wc-avgs">↑{zone.avgHi}<small> avg</small>&nbsp; ↓{zone.avgLo}<small> avg</small></span>
            {eta>0&&<span className="wc-eta">Forecast in ~{eta}d</span>}
          </div>}
          {has&&<div className="wc-days">{days.map((d,i)=>(
            <div className="wc-day" key={d}>
              <div className="wc-day-label">{dayLabel(d)}</div>
              <div className="wc-day-icon">{wmoEmoji(data.daily.weathercode[i])}</div>
              <div className="wc-day-hi">{Math.round(data.daily.temperature_2m_max[i])}°</div>
              <div className="wc-day-lo">{Math.round(data.daily.temperature_2m_min[i])}°</div>
            </div>
          ))}</div>}
        </div>
      </div>
    );
  }

  /* ── DAY CARD (itinerary) ── */
  function DayCard({day, wxCache, initOpen}){
    const [open,setOpen]=useState(initOpen||false);
    const wx=wxForDate(day.date, wxCache);
    return(
      <div className="day-card">
        <div className="day-header" onClick={()=>setOpen(o=>!o)}>
          <div className="day-num" style={{background:day.color}}>{day.day}</div>
          <div className="day-header-body">
            <div className="day-header-left">
              <div className="day-date-label">{day.label}</div>
              <div className="day-title">{day.title}</div>
              <div className="day-location">{day.loc}</div>
            </div>
            <div className="day-header-right">
              {wx
                ?<div className="day-wx">
                  <div className="day-wx-icon">{wmoEmoji(wx.code)}</div>
                  <div className="day-wx-temps" style={{color:wx.color}}>↑{wx.hi}° ↓{wx.lo}°</div>
                </div>
                :<div className="day-wx"><div className="day-wx-pending">forecast soon</div></div>
              }
              <span className={`day-chevron${open?' open':''}`}>▼</span>
            </div>
          </div>
        </div>
        {open&&(
          <div className="day-body">
            <div className="day-tip"><strong>💡 Tip:</strong> {day.tip}</div>
            <div className="timeline">
              {day.events.map((e,i)=>(
                <div className="tl-item" key={i}>
                  <div className={`tl-dot${e.type?' '+e.type:''}`}/>
                  <div className="tl-text">
                    {e.time&&<div className="tl-time">{e.time}</div>}
                    <div className="tl-desc">{e.text}</div>
                    {e.note&&<div className="tl-note">{e.note}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }

      {name:"Wedding card / gift logistics if bringing a physical gift"},
    ]},
  ];
  const ALL_KEYS=SECTIONS.flatMap(s=>s.items.map(i=>`${s.cat}::${i.name}`));

  /* ── APP ── */
  function App(){
    const [tab,      setTab]      = useState('itinerary');
    const [checked,  setChecked]  = useState(()=>{try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch{return{};}});
    const [filter,   setFilter]   = useState('all');
    const [expanded, setExpanded] = useState({});
    const [wxCache,  setWxCache]  = useState(()=>{try{return JSON.parse(localStorage.getItem(WEATHER_KEY))||{};}catch{return{};}});
    const [wxLoading,setWxLoading]= useState(false);

    useEffect(()=>{localStorage.setItem(STORAGE_KEY,JSON.stringify(checked));},[checked]);

    const loadWeather=useCallback(async(force=false)=>{
      const ts=wxCache._ts;
      if(!force&&ts&&(Date.now()-ts)<WEATHER_TTL)return;
      setWxLoading(true);
      try{
        const results=await Promise.allSettled(ZONES.map(z=>fetchZone(z)));
        const fresh={_ts:Date.now()};
        results.forEach((r,i)=>{if(r.status==='fulfilled'&&r.value?.daily?.time?.length>0)fresh[ZONES[i].zone]=r.value;});
        setWxCache(fresh);
        localStorage.setItem(WEATHER_KEY,JSON.stringify(fresh));
      }catch(e){}
      setWxLoading(false);
    },[wxCache._ts]);

    useEffect(()=>{loadWeather();},[]);

    const toggle    = key=>setChecked(p=>({...p,[key]:!p[key]}));
    const toggleSec = cat=>setExpanded(p=>({...p,[cat]:p[cat]===false?true:false}));
    const total=ALL_KEYS.length;
    const done=ALL_KEYS.filter(k=>checked[k]).length;
    const pct=Math.round((done/total)*100);

    const visible=SECTIONS.map(s=>({...s,items:s.items.filter(i=>{
      if(filter==='all')return true;
      if(filter==='required')return i.required;
      if(filter==='itinerary')return i.itinerary;
      if(filter==='wedding')return i.tags?.includes('wedding');
      if(filter==='church')return i.tags?.includes('church');
      return true;
    })})).filter(s=>s.items.length>0);

    return(
      <div>
        {/* FIXED HEADER */}
        <div className="app-header">
          <div className="header-title">Europe 2026</div>
          <div className="header-dates">May 30 – June 22</div>
          <div className="header-route">🇬🇧 UK &nbsp;→&nbsp; 🇮🇹 Italy &nbsp;→&nbsp; 🇵🇹 Portugal</div>
          <div className="tab-bar">
            <button className={`tab-btn${tab==='itinerary'?' active':''}`} onClick={()=>setTab('itinerary')}>🗓 Itinerary</button>
            <button className={`tab-btn${tab==='weather'?' active':''}`} onClick={()=>setTab('weather')}>🌤 Weather</button>
            <button className={`tab-btn${tab==='packing'?' active':''}`} onClick={()=>setTab('packing')}>
              🧳 Packing{done>0&&<span style={{fontSize:10,opacity:.7,marginLeft:4}}>({pct}%)</span>}
            </button>
          </div>
        </div>

        {/* ITINERARY TAB */}
        {tab==='itinerary'&&(
          <div className="tab-content">
            <div className="sl">24 Days · tap any day to expand</div>
            {DAYS.map(d=><DayCard key={d.date} day={d} wxCache={wxCache}/>)}
            <div className="app-footer">AJ · Europe 2026 · Built with Claude</div>
          </div>
        )}

        {/* WEATHER TAB */}
        {tab==='weather'&&(
          <div className="tab-content">
            <div className="sl">Forecast by Destination</div>
            <div className="weather-grid">
              {ZONES.map(z=><WeatherCard key={z.zone} zone={z} data={wxCache[z.zone]} loading={wxLoading}/>)}
            </div>
            <div className="wx-footer">
              <span className="wx-updated">{wxCache._ts?`Updated ${timeAgo(wxCache._ts)} · refreshes every 6h`:'Fetching forecasts…'}</span>
              <button className="refresh-btn" onClick={()=>loadWeather(true)} disabled={wxLoading}>{wxLoading?'↻ updating…':'↻ refresh'}</button>
            </div>
            <div className="app-footer">Open-Meteo · free · no API key · 16-day window</div>
          </div>
        )}

        {/* PACKING TAB */}
        {tab==='packing'&&(
          <div className="tab-content">
            <div className="sl">Progress</div>
            <div className="progress-bar-wrap">
              <div className="progress-top">
                <span className="progress-title">Items packed</span>
                <span className="progress-frac">{done} / {total} &nbsp;·&nbsp; {pct}%</span>
              </div>
              <div className="progress-track"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
            </div>
            <div className="sl">Filter</div>
            <div className="filters">
              {[{id:'all',label:'All Items'},{id:'required',label:'🔴 Must-Haves'},{id:'itinerary',label:'📋 Itinerary'},{id:'wedding',label:'💍 Wedding'},{id:'church',label:'⛪ Church'}].map(f=>(
                <button key={f.id} className={`filter-btn${filter===f.id?' active':''}`} onClick={()=>setFilter(f.id)}>{f.label}</button>
              ))}
            </div>
            <div className="sl">Items</div>
            {visible.map(sec=>{
              const isOpen=expanded[sec.cat]!==false;
              const secDone=sec.items.filter(i=>checked[`${sec.cat}::${i.name}`]).length;
              return(
                <div className="pack-section" key={sec.cat}>
                  <div className="pack-header" onClick={()=>toggleSec(sec.cat)}>
                    <div className="pack-header-left">{sec.cat}</div>
                    <div className="pack-header-right">
                      <span className="pack-count">{secDone}/{sec.items.length}</span>
                      <span className={`pack-chevron${isOpen?' open':''}`}>▼</span>
                    </div>
                  </div>
                  {isOpen&&(
                    <div className="pack-items">
                      {sec.items.map(item=>{
                        const key=`${sec.cat}::${item.name}`;
                        const isDone=checked[key];
                        return(
                          <div key={item.name} className={`pack-item${isDone?' done':''}`} onClick={()=>toggle(key)}>
                            <div className={`checkbox${isDone?' checked':''}`}/>
                            <div>
                              <div className="item-text">{item.name}</div>
                              {!isDone&&(
                                <div className="item-tags">
                                  {item.required&&<span className="tag tag-required">must-have</span>}
                                  {item.itinerary&&<span className="tag tag-itinerary">📋 itinerary</span>}
                                  {(item.tags||[]).map(t=>(
                                    <span key={t} className={`tag tag-${t}`}>
                                      {t==='wedding'?'💍 wedding':t==='church'?'⛪ church':t==='beach'?'🏖 beach':t}
                                    </span>
                                  ))}
                                </div>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
            <div className="app-footer">AJ · Europe 2026 · Built with Claude</div>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
